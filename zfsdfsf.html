<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>테마 변경 버튼</title>

  <style>
    #themeButton {
      background-color: white;
      color: black;
      border: 1px solid black;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button id="themeButton">테마변경</button>

  <script>
    const themeButton = document.getElementById("themeButton");

    let savedThemeColor = localStorage.getItem("themeButtonColor") || "white";

    themeButton.style.backgroundColor = savedThemeColor;

    if (savedThemeColor === "black") {
      themeButton.style.color = "white";
    } else {
      themeButton.style.color = "black";
    }

    themeButton.addEventListener("click", function () {
      if (themeButton.style.backgroundColor === "white") {
        themeButton.style.backgroundColor = "black";
        themeButton.style.color = "white";

        localStorage.setItem("themeButtonColor", "black");
      } 
      else {
        themeButton.style.backgroundColor = "white";
        themeButton.style.color = "black";

        localStorage.setItem("themeButtonColor", "white");
      }
    });
  </script>

</body>
</html>
