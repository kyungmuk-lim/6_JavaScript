<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연산자</title>
    <script>
        /*
            연산자

            1. 산술 연산자
                + - * / % **
            2. 대입 연산자
                = += -= *= /= %=
            3. 비교 연산자
                == != > < >= <=
                == : 값만 비교
                === : 값 + 타입까지 비교

                10 == '10' -> true
                10 === '10' -> false

                != : 값만 비교
                !== : 값 + 타입 비교 (사용 잘 안함)

                10 != '10' -> false
                10 !== '10' -> true, !(a===b)

            4. 논리 연산자
                && : ANd
                || : Or
                ! : Not

            5. 증감 연산자
                ++ : 값을 1 증가
                -- : 값을 1 감소
            
            6. 문자열 연산자
                + : 문자열을 연결할 때 사용

            7. 조건*삼항) 연산자
                조건에 따라 다른 값을 선택
                조건 ? 값1 : 값2 (ture면 값1, false면 값2)
            
            8. 타입 관련 연산자
                typeof : 변수의 타입을 반환
                instanceof : 변수가 특정 객체의 타입인지 확인
            
            9. 기타 연산자
                , : 여려 표현식 나열
                ?. : 옵셔널 체리닝 (null인지 아닌지 체크)
                ?? : null 병합 연산자(null일 경우 특정값을 반환)
        */
    </script>
</head>
<body>
    <script>
        // 비교 연산자
        console.log(5=='5')
        console.log(5==='5')

        // 증감 연산자
        let count = 1
        count++
        console.log(count)
        count--
        console.log(count)
        let result = ++count
        console.log(result)
        console.log(count)
        result = count++
        console.log(result)
        console.log(count)

        // 조건(삼항) 연산자
        let score = 85
        result = score >= 60 ? '합격' : '불합격'
        console.log(result)

        // 타입 관련 연산자
        let num = 10
        let arr = []
        console.log(typeof num)
        console.log(arr instanceof Array)

        // 기타 연산자
        let x = (1, 2, 3, 10)
        console.log(x)
        let user = null
        console.log(user?.name) // 오류가 날 상황을 대비해서 ? 사용하면 언디파인으로 나옴
        let calue = null
        let resultValue = value ?? '기본값' // ??를 null를 대신해 값을 처리해줌
        consolr.log(resultValue)
    </script>    
</body>
</html>
