<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <script>
        /*
            DOM
            html 문서를 트리 구조의 객체로 표현한 것으로, 자바스크립트를 통해 웹 페이지의 요소를 선택하거나 내용이나 스타일을 변경하며, 요쇼를 추가/삭제하는 등 동적인 화면 조작을 가능하게 해주는 인터페이스

            DOM 작동 원리
            1. 브라우저가 HTML 파일을 읽음
            2. HTML 태그를 하나하나 분석하여 트리 구조의 객체를 생성
            3. 각 태그는 노드라는 객체가 됨
            4. 자바스크립트는 DOM 객체를 통해 화면을 제어

            Document 객체
            - 웹 페이지 전체를 표현하는 최상위 DOM 객체로, HTML 문서에 직접 접근하고 조작할 수 있는 핵심 객체
            - 브라우저가 HTML 파일을 로드하면 자동으로 document 객체가 생성되며, 이 객체를 통해 웹 페이지의 요소들을 선택하거나, 생성 ,수정, 삭제할 수 있음
        */
    </script>
</head>
<body>
    <p id="greeting">안녕하세요</p>
    <p class="item">아이템 1</p>    
    <p class="item">아이템 2</p>
    <p class="desc">1번째 문장</p>
    <p class="desc">2번째 문장</p>
    <!-- ul#list>li{기존 항목} -->
    <ul id='list'>
        <li>기존 항목</li>
    </ul>
    <p><img id='image' src="./images/spring1.png" alt="봄"></p>

    <button onclick="changeText()">텍스트 바꾸기</button>
    <button onclick="highlightItems()">강조</button>
    <button onclick="updateFirst()">1번째 문장만 바뀌</button>
    <button onclick="updateDesc()">1/2번째 문장만 바뀌</button>
    <button onclick="addItme()">항목 추가</button>
    <button onclick="changeImage()">이미지 변경</button>

    <script>
         function changeText() {
            document.getElementById('greeting').innerText = '반가워요' //id="greeting">안녕하세요 이거를 반가워요로 바꿈
         }
         
         function highlightItems(){
            const items = document.getElementsByClassName('item')
            for(let i=0; i<items.length; i++) {
                items[i].style.color = 'deeppink'
            }
         }

         function updateFirst() {
            const item = document.querySelector('.desc')
            item.innerHTML = '<h1>바뀐 문장</h1>' // h1 말고 다른거 사용 가능
         }

         function updateDesc() {
            const items = document.querySelectorAll('.desc')
            for(let i=0; i<items.length; i++) {
                items[i].innerHTML = '<h3>바뀐 문장</h3>' // h1 말고 다른거 사용 가능
            }
         }

         function addItem() {
            const newItem = document.createElement('li') // li /li가 메모리에 만들어짐
            newItem.innerText = '새 항목' // li 새 항목 /li
            document.getElementById('list').appendChild(newItem)
         }

         function changeImage() {
            document.getElementById('image').setAttribute('sec', './images/spring2.png')

         }




    </script>
</body>
</html>
