<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료형 - 원시 타입</title>
    <script>
        /*
            원시타입
            원시 타입은 하나의 값만 저장하며, 값 자체가 변수에 직접 저장됩니다.

            Number : 숫자형 데이터. 숫자, 실수, 음수, 양수 모두 포함
                let age = 20
                let price = 3.14

            String : 문자열 데이터. 큰따움표 "", 작은따움표'', 백틱```(파이선 f-string과 유사)
                let name = '김사괴'
                let name = String('김사과')

            Boolean: 참과 거짓을 저장 (true와 false가 소문자임)
                let isLogin = true
            
            Undefined : 값이 할당되지 않은 상태. 변수를 선언했지만 값을 할당하지 않았을 떄 자동으로 undefined
                let value

            null : 의도적으로 값이 없음을 표현
                let data = null

            BigInt : 매우 큰 정수를 표현. 일반 number로 표현할 수 없는 큰 정수를 다룰 때 사용
                let bigNum = 123456789123456789n
                Number.MAX_SAFE_INTEGER

            

        */

        console.log(Number.MAX_SAFE_INTEGER)
    </script>
</head>
<body>
    <h1>원시 타입 예제</h1>
    <script>
        let age = 20
        let name  = '김사과'
        let isStudent = true
        let result
        let data = null
        let age2 = age
        age2 = 25

        console.log('age:', age, typeof age) // typeof (age)
        console.log('age:', age2, typeof age2) // typeof (age)
        console.log('name:', name, typeof name) 
        console.log('isStudent:', isStudent, typeof isStudent) 
        console.log('result:', result, typeof result) 
        console.log('data:', data, typeof data) 
    </script>
</body>
</html>
